<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TiaCAD Trust Gallery</title>
<style>
  body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }
  h1 { color: #333; }
  .grid { display: flex; flex-wrap: wrap; gap: 20px; }
  .card { background: white; border-radius: 8px; padding: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.15); max-width: 740px; }
  .card.failed { border: 2px solid #e63946; }
  .label { font-weight: bold; margin-bottom: 8px; color: #333; font-size: 14px; }
  .err { color: #e63946; padding: 20px; }
  img { max-width: 100%; border-radius: 4px; }
</style>
</head>
<body>
<h1>TiaCAD Trust Gallery</h1>
<p>Visual verification renders — each scenario should match its description.</p>
<div class="grid">
        <div class="card ">
          <div class="label">✓ boolean_subtract</div>
          <img src="boolean_subtract.png" alt="boolean_subtract">
        </div>
        <div class="card ">
          <div class="label">✓ box_basic</div>
          <img src="box_basic.png" alt="box_basic">
        </div>
        <div class="card ">
          <div class="label">✓ cylinder_basic</div>
          <img src="cylinder_basic.png" alt="cylinder_basic">
        </div>
        <div class="card ">
          <div class="label">✓ cylinder_on_plate</div>
          <img src="cylinder_on_plate.png" alt="cylinder_on_plate">
        </div>
        <div class="card ">
          <div class="label">✓ side_by_side</div>
          <img src="side_by_side.png" alt="side_by_side">
        </div>
        <div class="card ">
          <div class="label">✓ stacked_boxes</div>
          <img src="stacked_boxes.png" alt="stacked_boxes">
        </div>
        <div class="card ">
          <div class="label">✓ three_part_assembly</div>
          <img src="three_part_assembly.png" alt="three_part_assembly">
        </div>
</div>
</body>
</html>
