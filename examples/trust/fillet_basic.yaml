schema_version: "3.0"
metadata:
  name: Fillet Basic Trust
  description: >
    Box with all edges filleted (r=3). Trust check: all 12 edges are smooth arcs,
    no sharp 90° corners anywhere. Isometric view shows all 8 corners softened.
    Top/bottom views show rounded rectangular perimeter.

parts:
  box:
    primitive: box
    parameters:
      width: 40
      height: 40
      depth: 20
    origin: center

operations:
  filleted:
    type: finishing
    finish: fillet
    input: box
    radius: 3.0
    edges: all

export:
  default_part: filleted

# Same box shape as examples/validation/T1_fillet.tiacad (40x40x20, r=3) —
# exact closed-form Minkowski-sum-with-a-ball rounded-box volume (see that
# model's header comment for the formula); confirmed to match measured
# volume to full kernel precision.
expect:
  final: filleted
  volume: 31263.5927138785
  bbox: [40, 20, 40]
  watertight: true
  components: 1
  tol: { volume: 0.01 }
