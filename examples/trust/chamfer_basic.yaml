schema_version: "3.0"
metadata:
  name: Chamfer Basic Trust
  description: >
    Box with all edges chamfered (length=3). Trust check: all 12 edges have flat
    45° bevels. Isometric view shows all 8 corners have diamond-cut facets.
    Top view shows octagonal perimeter (4 sides + 4 chamfered corners).

parts:
  box:
    primitive: box
    parameters:
      width: 40
      height: 40
      depth: 20
    origin: center

operations:
  chamfered:
    type: finishing
    finish: chamfer
    input: box
    length: 3.0
    edges: all

export:
  default_part: chamfered

# Same box shape as examples/validation/T1_chamfer.tiacad (40x40x20, chamfer=3)
# — no closed form for a 12-edge 45° chamfer with corner interactions, so this
# reuses that model's measured-and-reviewed value (matches to full kernel
# precision, isotropic to axis order).
expect:
  final: chamfered
  volume: 30344.0
  bbox: [40, 20, 40]
  watertight: true
  components: 1
  tol: { volume: 0.01 }
