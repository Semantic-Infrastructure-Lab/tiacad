schema_version: "3.0"

metadata:
  name: Cone Basic Trust
  description: >
    Single cone. Trust check: top view (XY) = circle (base).
    Front (XZ) = triangle: wide at bottom, point at top.
    Side (YZ) = same triangle. Isometric = recognizable cone shape.
    Base radius=20, height=40.
  version: 1.0
  author: TIA

parts:
  cone:
    primitive: cone
    parameters:
      radius1: 20   # base radius
      radius2: 0    # apex (true cone)
      height: 40
    origin: center
    metadata:
      color: "#F59E0B"  # amber

export:
  default_part: cone

# Measured, not pure closed-form: r2=0 (true apex) makes the kernel build a
# near-degenerate top face, so the built volume (16755.998619) sits ~0.84mm³
# above the textbook 1/3*pi*r^2*h = 16755.160819 — a kernel apex-handling
# artifact, not a modeling bug. Reviewed and accepted as the baseline.
expect:
  final: cone
  volume: 16755.998619074424
  bbox: [40, 40, 40]
  watertight: true
  components: 1
  tol: { volume: 1.0 }
