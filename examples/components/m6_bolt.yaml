schema_version: "3.0"

# Reusable M6 bolt component (DIN 931 hex head, approximated as cylinder)
# Import with:
#   imports:
#     - path: ./components/m6_bolt.yaml
#       as: bolt
#       parameters:
#         length: 30

metadata:
  name: M6 Hex Bolt
  description: >
    Parametric M6 hex bolt (DIN 931). Head approximated as cylinder
    (hex profile requires sketch support). Shaft + head.
  version: 1.0
  author: TIA

parameters:
  length: 30          # shaft length in mm
  head_height: 4.0    # DIN 931 M6 hex head height
  head_radius: 5.5    # M6 hex head circumradius (wrench size 10mm → 5.77mm; 5.5 is inscribed)
  shaft_radius: 3.0   # M6 = 6mm diameter

parts:
  shaft:
    primitive: cylinder
    parameters:
      radius: '${shaft_radius}'
      height: '${length}'

  head:
    primitive: cylinder
    parameters:
      radius: '${head_radius}'
      height: '${head_height}'

operations:
  position_head:
    type: transform
    input: head
    transforms:
      - translate: [0, 0, '${length / 2 + head_height / 2}']

export:
  default_part: shaft
