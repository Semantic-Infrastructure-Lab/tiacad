schema_version: "2.0"

# Reusable M4 screw component (DIN 7985 pan head)
# Import with:
#   imports:
#     - path: ./components/m4_screw.yaml
#       as: screw
#       parameters:
#         length: 20

metadata:
  name: M4 Pan Head Screw
  description: Parametric M4 machine screw — pan head (DIN 7985). Shaft + head.
  version: 1.0
  author: TIA

parameters:
  length: 16          # shaft length in mm
  head_height: 3.1    # DIN 7985 M4 pan head height
  head_radius: 4.0    # DIN 7985 M4 pan head radius
  shaft_radius: 2.0   # M4 = 4mm diameter

parts:
  shaft:
    primitive: cylinder
    parameters:
      radius: '${shaft_radius}'
      height: '${length}'

  head:
    primitive: cylinder
    parameters:
      radius: '${head_radius}'
      height: '${head_height}'

operations:
  position_head:
    type: transform
    input: head
    transforms:
      - translate: [0, 0, '${length}']

export:
  default_part: shaft
