schema_version: "2.0"

# Reusable M5 screw component (DIN 7985 pan head)
# Import with:
#   imports:
#     - path: ./components/m5_screw.yaml
#       as: screw
#       parameters:
#         length: 20

metadata:
  name: M5 Pan Head Screw
  description: Parametric M5 machine screw — pan head (DIN 7985). Shaft + head.
  version: 1.0
  author: TIA

parameters:
  length: 20          # shaft length in mm
  head_height: 3.7    # DIN 7985 M5 pan head height
  head_radius: 5.0    # DIN 7985 M5 pan head radius
  shaft_radius: 2.5   # M5 = 5mm diameter

parts:
  shaft:
    primitive: cylinder
    parameters:
      radius: '${shaft_radius}'
      height: '${length}'

  head:
    primitive: cylinder
    parameters:
      radius: '${head_radius}'
      height: '${head_height}'

operations:
  position_head:
    type: transform
    input: head
    transforms:
      - translate: [0, 0, '${length}']

export:
  default_part: shaft
