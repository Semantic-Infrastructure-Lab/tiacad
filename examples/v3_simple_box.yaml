metadata:
  name: Simple Box Example (v3.0)
  description: Demonstrates v3.0 auto-generated anchors and unified spatial reference system
  version: 3.0
  author: TiaCAD Team
  created: 2025-11-07

parameters:
  base_size: 100
  base_height: 10
  top_size: 50
  top_height: 20

parts:
  # Base platform
  base:
    primitive: box
    parameters:
      width: '${base_size}'
      height: '${base_height}'
      depth: '${base_size}'
    origin: center

  # Top box positioned using auto-generated anchor (no manual reference definition!)
  top:
    primitive: box
    parameters:
      width: '${top_size}'
      height: '${top_height}'
      depth: '${top_size}'
    origin: center
    translate:
      to: base.face_top  # ✨ auto-generated anchor! No explicit definition needed

# No references section needed - auto-generated anchors handle everything!

export:
  default_part: top
  parts:
    - name: base
      description: Base platform
    - name: top
      description: Top box positioned using auto-generated anchor

# Reviewed ground-truth contract (seeded via `tiacad audit --write-contract`,
# see docs/developer/VALIDATION_STRENGTHENING.md section 4.1).
expect:
  final: top
  volume: 50000.0
  bbox: [50.0, 50.0, 20.0]
  watertight: true
  components: 1
