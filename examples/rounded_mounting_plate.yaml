metadata:
  name: Rounded Mounting Plate with Filleted Edges
  description: Demonstrates fillet finishing operation on a mounting plate with bolt holes
  version: 1.0
  author: TIA
  created: 2025-10-25
  phase: 2

parameters:
  # Plate dimensions
  plate_width: 150
  plate_height: 150
  plate_thickness: 8

  # Bolt circle specs
  bolt_count: 6
  bolt_circle_diameter: 100
  bolt_hole_diameter: 6.5  # For M6 bolts

  # Center hole
  center_hole_diameter: 40

  # Finishing
  edge_fillet_radius: 2.0  # Rounded edges for safety

parts:
  # Main mounting plate
  plate:
    primitive: box
    parameters:

      width: '${plate_width}'

      height: '${plate_height}'

      depth: '${plate_thickness}'
    origin: center

  # Bolt hole template (will be patterned)
  bolt_hole:
    primitive: cylinder
    radius: '${bolt_hole_diameter / 2}'
    height: '${plate_thickness + 2}'  # Slightly taller for clean cut
    origin: center

  # Center hole
  center_hole:
    primitive: cylinder
    radius: '${center_hole_diameter / 2}'
    height: '${plate_thickness + 2}'
    origin: center

operations:
  # Bolt/center holes are Z-axis cylinders by default, but the plate's thin
  # dimension is Y (width->X, depth->Y, height->Z per box primitive
  # semantics). Rotate 90 deg about X so the holes actually pierce the
  # plate's thickness instead of running parallel to it.
  bolt_hole_oriented:
    type: transform
    input: bolt_hole
    transforms:
      - rotate:
          angle: 90
          axis: X
          origin: [0, 0, 0]

  center_hole_oriented:
    type: transform
    input: center_hole
    transforms:
      - rotate:
          angle: 90
          axis: X
          origin: [0, 0, 0]

  # Create bolt circle pattern
  bolt_circle:
    type: pattern
    pattern: circular
    input: bolt_hole_oriented
    count: '${bolt_count}'
    axis: Y
    center: [0, 0, 0]
    radius: '${bolt_circle_diameter / 2}'

  # Subtract all holes from plate
  plate_with_holes:
    type: boolean
    operation: difference
    base: plate
    subtract:
      - center_hole_oriented
      - bolt_circle_0
      - bolt_circle_1
      - bolt_circle_2
      - bolt_circle_3
      - bolt_circle_4
      - bolt_circle_5

  # Fillet the 4 outer vertical corner edges (safe on complex geometry with holes)
  # Vertical == the plate's thickness direction, which is Y (see note above).
  plate_finished:
    type: finishing
    finish: fillet
    input: plate_with_holes
    radius: '${edge_fillet_radius}'
    edges:
      direction: Y

export:
  default_part: plate_finished

expect:
  final: plate_finished
  volume: 167612.229
  bbox: [150.0, 8.0, 150.0]
  watertight: true
  components: 1
