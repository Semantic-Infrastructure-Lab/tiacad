schema_version: 3.0

# Simple text embossing example
# Demonstrates basic text operation for creating raised text on a surface

metadata:
  title: "Simple Text Embossing"
  description: "Product label with embossed text"
  author: "TIA"

parameters:
  plate_width: 60
  plate_height: 40
  plate_depth: 5

parts:
  base_plate:
    primitive: box
    parameters:

      width: '${plate_width}'

      height: '${plate_height}'

      depth: '${plate_depth}'
    color: silver

operations:
  product_label:
    type: text
    input: base_plate
    text: "WIDGET PRO"
    face: ">Z"  # Top face
    position: [0, 0]
    size: 8
    depth: 1.5  # Positive = emboss (raised text)
    style: bold
    halign: center
    valign: center

export:
  default_part: product_label

# Reviewed ground-truth contract (seeded via `tiacad audit --write-contract`,
# see docs/developer/VALIDATION_STRENGTHENING.md section 4.1).
expect:
  final: product_label
  volume: 12192.178
  bbox: [60.0, 5.664, 41.5]
  watertight: true
  components: 1
