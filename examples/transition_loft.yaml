schema_version: "3.0"

metadata:
  name: Square to Circle Transition (Loft Operation)
  description: Demonstrates loft operation blending between different profiles
  version: 1.0
  author: TIA
  created: 2025-10-26
  phase: 3

parameters:
  bottom_size: 20
  top_radius: 10
  height: 15

sketches:
  square_base:
    plane: XY
    origin: [0, 0, 0]
    shapes:
      - type: rectangle
        width: ${bottom_size}
        height: ${bottom_size}
        center:
          - 0
          - 0

  circle_top:
    plane: XY
    origin:
      - 0
      - 0
      - ${height}
    shapes:
      - type: circle
        radius: ${top_radius}
        center:
          - 0
          - 0

# ============================================================================
# NOTE: The parts section is currently required even for sketch-only designs.
# We use a minimal placeholder part that will be ignored during export.
# The actual geometry comes from the loft operation below.
# ============================================================================
parts:
  _placeholder:
    primitive: box
    parameters:
      width: 1
      height: 1
      depth: 1
    origin: center

operations:
  transition:
    type: loft
    profiles:
      - square_base
      - circle_top
    ruled: false  # Smooth transition

export:
  default_part: transition

# Reviewed ground-truth contract (seeded via `tiacad audit --write-contract`,
# see docs/developer/VALIDATION_STRENGTHENING.md section 4.1).
expect:
  final: transition
  volume: 5371.429
  bbox: [20.0, 20.0, 15.0]
  watertight: true
  components: 1
